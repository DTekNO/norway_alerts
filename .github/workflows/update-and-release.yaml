name: Update and release

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get release metadata
        id: release_meta
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "tag=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG_VERSION -> Version: $VERSION"

      - name: Find integration domain
        id: find_domain
        run: |
          MANIFEST=$(find custom_components -name "manifest.json" -type f | head -n 1)
          if [ -z "$MANIFEST" ]; then
            echo "No manifest.json found under custom_components"
            exit 1
          fi
          DOMAIN=$(jq -r '.domain' "$MANIFEST")
          if [ -z "$DOMAIN" ] || [ "$DOMAIN" = "null" ]; then
            echo "Could not determine integration domain from $MANIFEST"
            exit 1
          fi
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "Found integration domain: $DOMAIN (from $MANIFEST)"

      - name: Update version in manifest.json
        run: |
          MANIFEST="${{ steps.find_domain.outputs.manifest }}"
          VERSION="${{ steps.release_meta.outputs.version }}"
          tmpfile=$(mktemp)
          jq --arg version "$VERSION" '.version = $version' "$MANIFEST" > "$tmpfile"
          mv "$tmpfile" "$MANIFEST"
          echo "Updated $MANIFEST to version $VERSION"

      - name: Commit updated manifest
        run: |
          MANIFEST="${{ steps.find_domain.outputs.manifest }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          if ! git diff --cached --quiet; then
            git commit -m "Update manifest version to ${{ steps.release_meta.outputs.version }}"
            git push origin HEAD:main
          else
            echo "No manifest changes to commit"
          fi

      - name: Refresh workspace to latest main
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Create integration ZIP
        run: |
          DOMAIN="${{ steps.find_domain.outputs.domain }}"
          cp LICENSE "custom_components/$DOMAIN/"
          cd "custom_components/$DOMAIN"
          zip -r "$DOMAIN.zip" ./
          echo "Created $DOMAIN.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: custom_components/${{ steps.find_domain.outputs.domain }}/${{ steps.find_domain.outputs.domain }}.zip